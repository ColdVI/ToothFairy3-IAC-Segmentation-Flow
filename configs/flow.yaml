# Residual flow (Track B) training configuration.
# Consumed by flow/train.py (falls back to JSON if pyyaml is unavailable).

# --- architecture ---
base: 32                 # U-Net base channel width
patch: 96                # cubic training/inference patch

# --- optimisation ---
lr: 1.0e-4
weight_decay: 1.0e-5
epochs: 500
batch_size: 2
num_workers: 4
fg_prob: 0.8             # fraction of patches centred on canal foreground

# --- residual path / sampling ---
ode_steps: 8             # Heun steps at inference
train_sigma: 0.1         # noise scale added to x0 during training
noise_frac: 0.5          # fraction of batches that get noise (rest are sigma=0)

# --- validation / checkpoint ---
checkpoint_every: 10    # full resume checkpoint; reset loses at most 9 epochs
val_every: 25
val_max_cases: 20        # subsample val for speed during training
# checkpoint score = 0.5*Dice + 0.5*clDice (ties -> lower HD95), set in validate.py

# --- loss weights (endpoint-based topology terms) ---
occ_tau: 0.05            # SDF -> occupancy sharpness
w_narrowband: 1.0
narrowband_band: 0.2
w_cldice: 0.5
cldice_iters: 10
w_laterality: 0.5
laterality_coord_weight: 0.0   # >0 to enable side-consistency term
w_tv: 0.0               # plain TV smoothness (NOT topology); off by default
